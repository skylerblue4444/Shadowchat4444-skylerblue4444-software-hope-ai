# ════════════════════════════════════════════════════════════════════════════
# SKY444 — Web3 Super-App | Production Docker Compose v3.0
# Stack: FastAPI backend + Vite frontend + Nginx + PostgreSQL + Redis
# Author: Skyler Blue Spillers — IITRL LLC
# ════════════════════════════════════════════════════════════════════════════
version: "3.9"

name: sky444

services:
  # ─── PostgreSQL: primary datastore ─────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: sky444-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sky444}
      POSTGRES_USER: ${POSTGRES_USER:-sky444}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sky444_change_me_in_prod}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sky444} -d ${POSTGRES_DB:-sky444}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sky444-net

  # ─── Redis: session cache, pub/sub for WebSocket, rate-limit state ────────
  redis:
    image: redis:7-alpine
    container_name: sky444-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sky444-net

  # ─── Backend: FastAPI + SKY444 PoW blockchain + WebSocket server ──────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: sky444/backend:3.0.0
    container_name: sky444-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-sky444}:${POSTGRES_PASSWORD:-sky444_change_me_in_prod}@postgres:5432/${POSTGRES_DB:-sky444}
      REDIS_URL: redis://redis:6379/0
      SKY444_ENV: ${SKY444_ENV:-production}
      JWT_SECRET: ${JWT_SECRET:-change_this_in_production_use_openssl_rand_hex_32}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost,http://localhost:80}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/').read()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"
    networks:
      - sky444-net

  # ─── Frontend: Vite static build served by nginx ──────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: sky444/frontend:3.0.0
    container_name: sky444-frontend
    restart: unless-stopped
    expose:
      - "80"
    networks:
      - sky444-net

  # ─── Nginx: reverse proxy with TLS-ready config, gzip, and rate limiting ──
  nginx:
    image: nginx:1.27-alpine
    container_name: sky444-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx_cache:/var/cache/nginx
    depends_on:
      - backend
      - frontend
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - sky444-net

networks:
  sky444-net:
    driver: bridge
    name: sky444-net

volumes:
  postgres_data:
    name: sky444_postgres_data
  redis_data:
    name: sky444_redis_data
  nginx_cache:
    name: sky444_nginx_cache
