<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Responsive viewport — critical for mobile/iPad/desktop UX -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, viewport-fit=cover" />

    <!-- Theme & color scheme -->
    <meta name="theme-color" content="#0a0a1e" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#0a0a1e" media="(prefers-color-scheme: light)" />
    <meta name="color-scheme" content="dark" />

    <!-- SEO / social -->
    <title>SKY444 — Web3 Super-App | IITRL LLC</title>
    <meta name="description" content="SKY444 — The ultimate Web3 super-app: Mining, Staking, DeFi Swap, NFT Marketplace, ShadowChat, Casino, DAO Governance, and more. Built by Skyler Blue Spillers at IITRL LLC." />
    <meta name="keywords" content="SKY444, Web3, blockchain, DeFi, NFT, crypto, staking, mining, DAO, super-app" />
    <meta name="author" content="Skyler Blue Spillers — IITRL LLC" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="SKY444 — Web3 Super-App" />
    <meta property="og:description" content="The ultimate decentralized super-app powered by the SKY444 blockchain." />
    <meta property="og:site_name" content="SKY444" />

    <!-- iOS Safari / Apple PWA support -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="SKY444" />
    <meta name="format-detection" content="telephone=no" />

    <!-- Android / Chrome PWA support -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="SKY444" />

    <!-- Microsoft / Windows tiles -->
    <meta name="msapplication-TileColor" content="#7c3aed" />
    <meta name="msapplication-tap-highlight" content="no" />

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.webmanifest" />

    <!-- Icons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/icon-192.png" />

    <!-- Preconnect for font performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <style>
      /* Eliminate FOUC and provide a polished initial loading state */
      html, body, #root { margin: 0; padding: 0; height: 100%; background: #0a0a1e; }
      body { overscroll-behavior: none; -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }

      /* Safe-area insets for iPhone notch / Dynamic Island / iPad */
      @supports (padding: env(safe-area-inset-top)) {
        body {
          padding-top: env(safe-area-inset-top);
          padding-bottom: env(safe-area-inset-bottom);
          padding-left: env(safe-area-inset-left);
          padding-right: env(safe-area-inset-right);
        }
      }

      /* Initial loading screen — displayed before React hydrates */
      .initial-loader {
        position: fixed; inset: 0;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        background: radial-gradient(ellipse at center, #1a0b2e 0%, #0a0a1e 70%);
        z-index: 9999;
      }
      .initial-loader__logo {
        width: 64px; height: 64px; border-radius: 14px;
        background: linear-gradient(135deg, #7c3aed, #06b6d4);
        display: flex; align-items: center; justify-content: center;
        font-size: 30px; font-weight: 700; color: #fff;
        box-shadow: 0 0 40px rgba(124,58,237,0.6);
        animation: loaderPulse 1.6s ease-in-out infinite;
      }
      .initial-loader__text {
        margin-top: 20px;
        font-family: 'JetBrains Mono', ui-monospace, monospace;
        font-size: 12px; letter-spacing: 0.2em; color: #a855f7;
        text-transform: uppercase;
      }
      @keyframes loaderPulse {
        0%,100% { box-shadow: 0 0 30px rgba(124,58,237,0.4); transform: scale(1); }
        50%     { box-shadow: 0 0 60px rgba(168,85,247,0.8); transform: scale(1.05); }
      }

      /* Disable tap highlight on mobile for cleaner touch feedback */
      * { -webkit-tap-highlight-color: transparent; }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="initial-loader">
        <div class="initial-loader__logo">⬡</div>
        <div class="initial-loader__text">Booting SKY444 Super-App…</div>
      </div>
    </div>

    <!-- React entry -->
    <script type="module" src="/src/index.tsx"></script>

    <!-- Service worker registration for PWA (production only) -->
    <script>
      if ('serviceWorker' in navigator && window.location.protocol === 'https:') {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').catch(() => {});
        });
      }
    </script>
  </body>
</html>
